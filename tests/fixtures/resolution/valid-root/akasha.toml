schema_version = 1

[files]
registry = "Meta/projects.yaml"
agent_instructions = "Meta/AGENTS.md"

[folders]
templates = "templates"
global = "Global"
projects = "Projects"
inbox = "Inbox"

[context]
tasks = "task"
problems = "problem"
handoffs = "handoff"
recent_events = ["session"]
open_statuses = ["open", "active", "blocked", "in-progress"]

[project]
templates = "templates"
index = "index.md"
roadmap = "roadmap.md"

[project.note_types.session]
class = "event"
folder = "events/sessions"
required_fields = ["project", "type", "date"]

[project.note_types.handoff]
class = "event"
folder = "events/handoffs"
required_fields = ["project", "type", "date"]

[project.note_types.task]
class = "record"
folder = "records/tasks"
required_fields = ["project", "type", "status", "created", "updated"]

[project.note_types.problem]
class = "record"
folder = "records/problems"
required_fields = ["project", "type", "status", "created", "updated"]

[project.note_types.entity]
class = "entity"
folder = "entities"
required_fields = ["entity", "kind", "status", "reviewed"]
